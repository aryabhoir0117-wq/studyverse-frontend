<!DOCTYPE html>
<html>
<head>
<title>Create Lesson</title>
<link rel="stylesheet" href="../css/layout.css">
</head>

<body>

<div class="app-layout">

<aside class="sidebar">
  <h2 class="logo">StudyVerse</h2>
  <nav class="nav-links">
    <a href="teacher-dashboard.html">Dashboard</a>
    <a href="create-lesson.html">Create Lesson</a>
    <a href="upload-notes.html">Upload Notes</a>
  </nav>
</aside>

<div class="main-area">

  <h1 style="padding:20px;">Create Lesson</h1>

  <div class="form-box">

    <label>Subject</label>
    <select id="lessonSubject">
      <option value="maths">Math</option>
      <option value="science">Science</option>
      <option value="english">English</option>
    </select>

    <label>Topic (for AI generation)</label>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:20px;">
      <input type="text" id="topicInput" class="input-field" placeholder="e.g. Pythagoras theorem" style="margin-bottom:0;flex:1;">
      <button onclick="generateWithAI()" class="btn-primary" style="white-space:nowrap;">⚡ Generate with AI</button>
    </div>
    <p id="aiStatus" style="color:#facc15;margin-bottom:15px;"></p>

    <label>Question</label>
    <input type="text" id="questionInput" class="input-field" placeholder="Enter question">

    <label>Option 1</label>
    <input type="text" id="opt1" class="input-field">

    <label>Option 2</label>
    <input type="text" id="opt2" class="input-field">

    <label>Option 3</label>
    <input type="text" id="opt3" class="input-field">

    <label>Option 4</label>
    <input type="text" id="opt4" class="input-field">

    <label>Correct Answer (0-3)</label>
    <input type="number" id="answerIndex" class="input-field" min="0" max="3"><br><br>

    <button onclick="saveLesson()" class="btn-primary">Save Lesson</button>

  </div>
<h2 style="padding:20px 30px;">📋 My Lessons</h2>

<div style="padding:0 30px 30px;">
  <table style="width:100%;border-collapse:collapse;">
    <thead>
      <tr style="background:#1e293b;color:#facc15;">
        <th style="padding:12px;text-align:left;border-bottom:1px solid #334155;">Subject</th>
        <th style="padding:12px;text-align:left;border-bottom:1px solid #334155;">Question</th>
        <th style="padding:12px;text-align:left;border-bottom:1px solid #334155;">Answer</th>
        <th style="padding:12px;text-align:left;border-bottom:1px solid #334155;">Actions</th>
      </tr>
    </thead>
    <tbody id="lessonsTableBody">
      <tr><td colspan="4" style="padding:20px;color:#94a3b8;">Loading...</td></tr>
    </tbody>
  </table>
</div>
</div>

</div>

<script src="../js/create-lesson.js"></script>

</body>
</html>
